<!-- Property Cards Component for HTMX -->
{% for prop in properties %}
<a href="{{ url_for('property_detail', property_id=prop.id) }}"
   class="block bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition group">
    <div class="h-32 bg-gradient-to-br from-emerald-100 to-blue-100 flex items-center justify-center">
        <svg class="w-10 h-10 text-emerald-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
    </div>
    <div class="p-3">
        <h3 class="font-medium text-gray-900 group-hover:text-emerald-600 truncate">{{ prop.title }}</h3>
        <p class="text-xs text-gray-600 truncate">{{ prop.location }}</p>
        <p class="text-sm font-semibold text-emerald-600 mt-1">₦{{ "{:,.0f}".format(prop.price) if prop.price else 'N/A' }}</p>
    </div>
</a>
{% else %}
<div class="col-span-full text-center py-8 text-gray-500">
    No properties found
</div>
{% endfor %}
