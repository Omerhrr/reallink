{% extends 'base.html' %}

{% block title %}Edit Property - RealLink{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <a href="{{ url_for('property_detail', property_id=property.id) }}" class="text-emerald-600 hover:underline flex items-center mb-4">
            <svg class="w-4 h-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Back to Property
        </a>
        <h1 class="text-2xl font-bold text-gray-900">Edit Property</h1>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <form method="POST" action="{{ url_for('edit_property', property_id=property.id) }}">
            <div class="space-y-6">
                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Property Title</label>
                    <input type="text" id="title" name="title" value="{{ property.title }}"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
                </div>

                <div>
                    <label for="location" class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                    <input type="text" id="location" name="location" value="{{ property.location }}"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
                </div>

                <div>
                    <label for="price" class="block text-sm font-medium text-gray-700 mb-1">Price (₦)</label>
                    <input type="number" id="price" name="price" value="{{ property.price }}"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
                </div>

                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea id="description" name="description" rows="4"
                              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">{{ property.description }}</textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="bedrooms" class="block text-sm font-medium text-gray-700 mb-1">Bedrooms</label>
                        <input type="number" id="bedrooms" name="bedrooms" value="{{ property.bedrooms }}"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
                    </div>
                    <div>
                        <label for="bathrooms" class="block text-sm font-medium text-gray-700 mb-1">Bathrooms</label>
                        <input type="number" id="bathrooms" name="bathrooms" value="{{ property.bathrooms }}"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
                    </div>
                </div>

                <div>
                    <label for="area_sqm" class="block text-sm font-medium text-gray-700 mb-1">Area (sqm)</label>
                    <input type="number" id="area_sqm" name="area_sqm" step="0.1" value="{{ property.area_sqm }}"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
                </div>

                <div class="flex gap-4">
                    <button type="submit"
                            class="flex-1 bg-emerald-600 text-white py-3 rounded-lg font-semibold hover:bg-emerald-700 transition">
                        Save Changes
                    </button>
                    <a href="{{ url_for('property_detail', property_id=property.id) }}"
                       class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-200 transition text-center">
                        Cancel
                    </a>
                </div>
            </div>
        </form>
    </div>

    <!-- Delete Property -->
    <div class="mt-6 bg-red-50 border border-red-200 rounded-xl p-4">
        <h3 class="font-medium text-red-900 mb-2">Danger Zone</h3>
        <p class="text-sm text-red-700 mb-3">Once deleted, this property cannot be recovered.</p>
        <form action="{{ url_for('delete_property', property_id=property.id) }}" method="POST"
              onsubmit="return confirm('Are you sure you want to delete this property?');">
            <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition">
                Delete Property
            </button>
        </form>
    </div>
</div>
{% endblock %}
